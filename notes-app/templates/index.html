<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>📝 My Notes App</h1>

        <button onclick="addNote()">Add Note</button>

    <div id="notesContainer"></div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
